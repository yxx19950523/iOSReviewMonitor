name: Build iOS Review Monitor

on:
  workflow_dispatch:
  push:
    paths:
      - "iOSReviewMonitor/**"

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: iOSReviewMonitor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python -m PyInstaller --noconfirm --windowed --name "iOS审核状态监控" main.py
      - uses: actions/upload-artifact@v4
        with:
          name: iOSReviewMonitor-${{ matrix.os }}
          path: iOSReviewMonitor/dist/**
