name: Build iOS Review Monitor

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: iOSReviewMonitor-macOS
          - os: windows-latest
            artifact_name: iOSReviewMonitor-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python -m PyInstaller --noconfirm --windowed --name "iOS审核状态监控" main.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/**
