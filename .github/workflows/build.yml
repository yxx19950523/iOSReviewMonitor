name: Build iOS Review Monitor

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            artifact_name: iOSReviewMonitor-macOS-AppleSilicon
            package_name: iOS审核状态监控-macOS-AppleSilicon.zip
          - os: macos-13
            artifact_name: iOSReviewMonitor-macOS-Intel
            package_name: iOS审核状态监控-macOS-Intel.zip
          - os: windows-latest
            artifact_name: iOSReviewMonitor-Windows
            package_name: iOS审核状态监控-Windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python -m PyInstaller --noconfirm --windowed --name "iOS审核状态监控" main.py
      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          chmod +x "dist/iOS审核状态监控.app/Contents/MacOS/iOS审核状态监控"
          codesign --force --deep --sign - "dist/iOS审核状态监控.app"
          mkdir -p release
          ditto -c -k --keepParent "dist/iOS审核状态监控.app" "release/${{ matrix.package_name }}"
      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path "dist\*" -DestinationPath "release\${{ matrix.package_name }}" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**
